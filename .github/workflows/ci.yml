name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install minimal deps for tests only (avoid heavy pyats install in CI)
          pip install pytest pytest-cov anthropic pydantic structlog rich typer
      - name: Lint
        run: |
          pip install ruff
          ruff check netagent/
      - name: Test
        run: pytest tests/ -v
